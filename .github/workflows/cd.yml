name: Frontend CD

on:
  push:
    branches: [main, master]

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USER }}"
          test -n "${{ secrets.VPS_PORT }}"
          test -n "${{ secrets.VPS_KEY }}"
          test -n "${{ secrets.FRONTEND_APP_PATH }}"
          test -n "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}"

  deploy:
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ secrets.FRONTEND_APP_PATH }}
          REPO_URL: git@github.com:rogerinfas/admin-gps-based-transit-optimization.git
          BRANCH_NAME: ${{ github.ref_name }}
          FRONTEND_PORT: "3000"
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_PATH,REPO_URL,BRANCH_NAME,FRONTEND_PORT,NEXT_PUBLIC_API_BASE_URL
          command_timeout: 30m
          script: |
            set -e

            if [ ! -d "$APP_PATH/.git" ]; then
              git clone "$REPO_URL" "$APP_PATH"
            fi

            cd "$APP_PATH"
            git fetch --all --prune
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            cat > .env <<EOF
            FRONTEND_PORT=${FRONTEND_PORT}
            NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
            EOF

            # Limpiar contenedores antiguos del proyecto por defecto para evitar conflictos
            docker stop transit-admin || true
            docker rm transit-admin || true

            docker compose -p transit-frontend -f docker/docker-compose.prod.yml up -d --build
