name: Frontend CD

on:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        run: |
          test -n "${{ secrets.VPS_HOST }}"
          test -n "${{ secrets.VPS_USER }}"
          test -n "${{ secrets.VPS_PORT }}"
          test -n "${{ secrets.VPS_KEY }}"
          test -n "${{ secrets.FRONTEND_APP_PATH }}"
          test -n "${{ secrets.NEXT_PUBLIC_API_BASE_URL }}"
          test -n "${{ secrets.REGISTRY_USERNAME }}"
          test -n "${{ secrets.REGISTRY_TOKEN }}"

  build_and_push:
    runs-on: ubuntu-latest
    needs: preflight

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            rderoger/admin-gps-based-transit-optimization:${{ github.sha }}
            rderoger/admin-gps-based-transit-optimization:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ secrets.FRONTEND_APP_PATH }}
          REPO_URL: https://github.com/rogerinfas/admin-gps-based-transit-optimization.git
          BRANCH_NAME: ${{ github.ref_name }}
          IMAGE_TAG: ${{ github.sha }}
          IMAGE_REPO: rderoger/admin-gps-based-transit-optimization
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          FRONTEND_PORT: "3000"
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_PATH,REPO_URL,BRANCH_NAME,IMAGE_TAG,IMAGE_REPO,REGISTRY_USERNAME,REGISTRY_TOKEN,FRONTEND_PORT,NEXT_PUBLIC_API_BASE_URL
          command_timeout: 30m
          script: |
            set -e

            if [ ! -d "$APP_PATH/.git" ]; then
              git clone "$REPO_URL" "$APP_PATH"
            fi

            cd "$APP_PATH"
            git fetch --all --prune
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            cat > .env <<EOF
            FRONTEND_PORT=${FRONTEND_PORT}
            NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
            IMAGE_TAG=${IMAGE_TAG}
            ADMIN_IMAGE=${IMAGE_REPO}:${IMAGE_TAG}
            EOF

            # Limpiar contenedores antiguos del proyecto por defecto para evitar conflictos
            docker stop transit-admin || true
            docker rm transit-admin || true

            echo "${REGISTRY_TOKEN}" | docker login -u "${REGISTRY_USERNAME}" --password-stdin
            docker compose -p transit-frontend -f docker/docker-compose.prod.yml pull admin
            docker compose -p transit-frontend -f docker/docker-compose.prod.yml up -d admin
