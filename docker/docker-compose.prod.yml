services:
  admin:
    image: ${ADMIN_IMAGE:-rderoger/admin-gps-based-transit-optimization:${IMAGE_TAG:-latest}}
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      - proxy_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.transit-admin.rule=Host(`gps-based-transit-optimization.onlinestornsoftware.win`)"
      - "traefik.http.routers.transit-admin.entrypoints=https"
      - "traefik.http.routers.transit-admin.tls.certresolver=cloudflare"
      - "traefik.http.services.transit-admin.loadbalancer.server.port=3000"

networks:
  proxy_net:
    external: true
